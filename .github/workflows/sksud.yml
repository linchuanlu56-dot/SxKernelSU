name: Build sksud
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      pack_lkm:
        required: false
        type: boolean
        default: false
      pack_sksuinit:
        required: false
        type: boolean
        default: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v8
    
    - name: Prepare LKM files
      if: ${{ inputs.pack_lkm }}
      run: |
        cp android*-lkm/*_sxkernelsu.ko ./userspace/sksud/bin/aarch64/
    
    - name: Prepare sksuinit
      if: ${{ inputs.pack_sksuinit }}
      run: |
        mv sksuinit/*/release/sksuinit ./userspace/sksud/bin/aarch64/
        
    - name: Setup rustup
      run: |
        rustup update stable
        rustup target add ${{ inputs.target }}

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: userspace/sksud
        cache-targets: false

    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r29

    - name: Build sksud
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        source .github/scripts/setup-rust-build.sh ${{ inputs.target }} 26
        cargo build --target $TRIPLE --release --manifest-path ./userspace/sksud/Cargo.toml

    - name: Upload sksud artifact
      uses: actions/upload-artifact@v7
      with:
        name: sksud-${{ inputs.target }}
        path: target/${{ inputs.target }}/release/sksud
