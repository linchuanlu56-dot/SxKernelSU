name: Build SxKernelSU Kernel Module

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string
      expected_size2:
        description: 'Second expected signature size (for PR builds)'
        required: false
        default: ''
        type: string
      expected_hash2:
        description: 'Second expected signature hash (for PR builds)'
        required: false
        default: ''
        type: string

jobs:
  build-sxkernelsu-ko:
    name: Build sxkernelsu.ko for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v7

    - name: Cache ccache
      uses: actions/cache@v6
      with:
        path: ~/.ccache
        key: ${{ inputs.kmi }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ inputs.kmi }}-ccache-

    - name: Build sxkernelsu.ko
      env:
        EXPECTED_SIZE2: ${{ inputs.expected_size2 }}
        EXPECTED_HASH2: ${{ inputs.expected_hash2 }}
        CCACHE_DIR: ~/.ccache
        CCACHE_SLOPPINESS: file_macro,time_macros
      run: |
        git config --global --add safe.directory /__w/SxKernelSU/SxKernelSU

        apt-get update -qq && apt-get install -y -qq ccache >/dev/null 2>&1 || true

        cd kernel

        echo "=== Building sxkernelsu.ko for KMI: ${{ inputs.kmi }} ==="

        EXTRA_ARGS=""
        if [ -n "$EXPECTED_SIZE2" ] && [ -z "$EXPECTED_HASH2" ]; then
          echo "ERROR: expected_hash2 must be provided when expected_size2 is set."
          exit 1
        fi
        if [ -z "$EXPECTED_SIZE2" ] && [ -n "$EXPECTED_HASH2" ]; then
          echo "ERROR: expected_size2 must be provided when expected_hash2 is set."
          exit 1
        fi
        if [ -n "$EXPECTED_SIZE2" ]; then
          EXTRA_ARGS="SKS_EXPECTED_SIZE2=$EXPECTED_SIZE2 SKS_EXPECTED_HASH2=$EXPECTED_HASH2"
        fi
        CC="ccache clang" CONFIG_SKS=m make $EXTRA_ARGS

        echo "=== ccache stats ==="
        ccache -s

        echo "=== Build completed ==="

        # Create output directory in GitHub workspace
        mkdir -p /github/workspace/out

        # Copy with KMI-specific naming
        OUTPUT_NAME="${{ inputs.kmi }}_sxkernelsu.ko"
        cp sxkernelsu.ko "/github/workspace/out/$OUTPUT_NAME"
        
        echo "Copied to: /github/workspace/out/$OUTPUT_NAME"
        ls -la "/github/workspace/out/$OUTPUT_NAME"
        echo "Size: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"
        llvm-strip -d "/github/workspace/out/$OUTPUT_NAME"
        echo "Size after stripping: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"

    - name: Upload sxkernelsu.ko artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.kmi }}-lkm
        path: /github/workspace/out/${{ inputs.kmi }}_sxkernelsu.ko
