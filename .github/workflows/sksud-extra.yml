name: Build sksud with cross
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      os:
        required: false
        type: string
        default: ubuntu-latest
      pack_lkm:
        required: false
        type: boolean
        default: false
      pack_sksuinit:
        required: false
        type: boolean
        default: false
jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v8
    
    - name: Prepare LKM files
      if: ${{ inputs.pack_lkm }}
      run: |
        cp android*-lkm/*_sxkernelsu.ko ./userspace/sksud/bin/aarch64/
    
    - name: Prepare sksuinit
      if: ${{ inputs.pack_sksuinit }}
      run: |
        mv sksuinit/*/release/sksuinit ./userspace/sksud/bin/aarch64/
        
    - name: Setup rustup
      run: |
        rustup update stable
        if [[ ${{ inputs.target }} == *"-apple-darwin" ]]; then
          rustup target add ${{ inputs.target }}
        fi
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: userspace/sksud
        cache-targets: false
        cache-bin: false

    - name: Install cross
      run: |
        RUSTFLAGS="" cargo install cross --git https://github.com/cross-rs/cross --rev 66845c1

    - name: Build sksud
      run: CROSS_NO_WARNINGS=0 cross build --target ${{ inputs.target }} --release --manifest-path ./userspace/sksud/Cargo.toml

    - name: Upload sksud artifact
      uses: actions/upload-artifact@v7
      with:
        name: sksud-${{ inputs.target }}
        path: target/${{ inputs.target }}/release/sksud*
